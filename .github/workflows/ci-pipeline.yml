name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # API — Calidad de código
  # ─────────────────────────────────────────────────────────────────────────────
  api-quality:
    name: API — Calidad de código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Instalar dependencias
        working-directory: apps/api
        run: pip install --no-cache-dir -r requirements.txt

      - name: Instalar herramientas de dev
        run: pip install ruff pyright

      - name: Ruff — lint
        working-directory: apps/api
        continue-on-error: true
        run: ruff check . --output-format=github

      - name: Ruff — formato
        working-directory: apps/api
        continue-on-error: true
        run: ruff format --check .

      - name: Pyright — verificación de tipos
        working-directory: apps/api
        continue-on-error: true
        run: pyright

  # ─────────────────────────────────────────────────────────────────────────────
  # API — Tests
  # ─────────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API — Tests unitarios
    runs-on: ubuntu-latest
    needs: api-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Instalar dependencias
        working-directory: apps/api
        run: pip install --no-cache-dir -r requirements.txt

      - name: Instalar herramientas de dev
        run: pip install pytest pytest-asyncio pytest-mock httpx

      - name: Pytest — tests unitarios
        working-directory: apps/api
        continue-on-error: true
        run: |
          pytest -m "not integration" -v \
            --tb=short \
            --junitxml=test-results.xml

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: apps/api/test-results.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # API — Docker build
  # ─────────────────────────────────────────────────────────────────────────────
  api-docker:
    name: API — Validar Docker build
    runs-on: ubuntu-latest
    needs: api-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen API
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: olimpo-api:ci

  # ─────────────────────────────────────────────────────────────────────────────
  # Admin API — Calidad de código
  # ─────────────────────────────────────────────────────────────────────────────
  admin-quality:
    name: Admin API — Calidad de código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar herramientas de dev
        run: pip install ruff pyright

      - name: Ruff — lint
        working-directory: apps/admin
        continue-on-error: true
        run: ruff check . --output-format=github

      - name: Ruff — formato
        working-directory: apps/admin
        continue-on-error: true
        run: ruff format --check .

      - name: Pyright — verificación de tipos
        working-directory: apps/admin
        continue-on-error: true
        run: pyright

  # ─────────────────────────────────────────────────────────────────────────────
  # Admin API — Docker build
  # ─────────────────────────────────────────────────────────────────────────────
  admin-docker:
    name: Admin API — Validar Docker build
    runs-on: ubuntu-latest
    needs: admin-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Admin API
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: olimpo-admin:ci

  # ─────────────────────────────────────────────────────────────────────────────
  # Web CRM — Calidad de código y build
  # ─────────────────────────────────────────────────────────────────────────────
  web-quality:
    name: Web CRM — Lint, tipos y build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/web
        run: npm ci

      - name: TypeScript — verificar tipos
        working-directory: apps/web
        continue-on-error: true
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/web
        continue-on-error: true
        run: npm run lint

      - name: Next.js — build de producción
        working-directory: apps/web
        continue-on-error: true
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          NEXT_PUBLIC_API_URL: https://staging-api.olimpo.mx

  # ─────────────────────────────────────────────────────────────────────────────
  # Admin Web — Calidad de código y build
  # ─────────────────────────────────────────────────────────────────────────────
  admin-web-quality:
    name: Admin Web — Lint, tipos y build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/admin-web
        run: npm ci

      - name: TypeScript — verificar tipos
        working-directory: apps/admin-web
        continue-on-error: true
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/admin-web
        continue-on-error: true
        run: npm run lint

      - name: Next.js — build de producción
        working-directory: apps/admin-web
        continue-on-error: true
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Seguridad — escaneo de dependencias
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Seguridad — dependencias vulnerables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit — API
        working-directory: apps/api
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc --output=json -o pip-audit-api.json || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit — Web
        working-directory: apps/web
        run: npm audit --audit-level=high || true

      - name: npm audit — Admin Web
        working-directory: apps/admin-web
        run: npm audit --audit-level=high || true

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate final — todos los checks deben pasar para poder mergear
  # ─────────────────────────────────────────────────────────────────────────────
  pipeline-ok:
    name: Pipeline — Todo OK
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - api-docker
      - admin-docker
      - web-quality
      - admin-web-quality
    if: always()
    steps:
      - name: Verificar resultado de todos los jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ Uno o más jobs fallaron."
            exit 1
          fi
          echo "✅ Todos los checks del pipeline pasaron."
