name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  api-quality:
    name: API — Calidad de código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Instalar dependencias de producción
        working-directory: apps/api
        run: pip install --no-cache-dir -r requirements.txt

      - name: Instalar herramientas de dev
        run: pip install ruff pyright

      - name: Ruff — lint
        working-directory: apps/api
        run: ruff check . --output-format=github

      - name: Ruff — formato
        working-directory: apps/api
        run: ruff format --check .

      - name: Pyright — verificación de tipos
        working-directory: apps/api
        run: pyright

  api-tests:
    name: API — Tests unitarios
    runs-on: ubuntu-latest
    needs: api-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Instalar dependencias de producción
        working-directory: apps/api
        run: pip install --no-cache-dir -r requirements.txt

      - name: Instalar herramientas de dev
        run: pip install pytest pytest-asyncio

      - name: Pytest — tests unitarios
        working-directory: apps/api
        run: |
          pytest -m "not integration" -v \
            --tb=short \
            --junitxml=test-results.xml

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: apps/api/test-results.xml

  api-docker:
    name: API — Validar Docker build
    runs-on: ubuntu-latest
    needs: api-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen API
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: olimpo-api:ci

      - name: Guardar cache de Docker
        uses: actions/upload-artifact@v4
        with:
          name: docker-api-cache
          path: /tmp/.buildx-cache
          retention-days: 2

  admin-quality:
    name: Admin API — Calidad de código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        working-directory: apps/admin
        run: pip install --no-cache-dir ".[dev]"

      - name: Ruff — lint
        working-directory: apps/admin
        run: ruff check . --output-format=github

      - name: Ruff — formato
        working-directory: apps/admin
        run: ruff format --check .

      - name: Pyright — verificación de tipos
        working-directory: apps/admin
        run: pyright

  admin-docker:
    name: Admin API — Validar Docker build
    runs-on: ubuntu-latest
    needs: admin-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Admin API
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: olimpo-admin:ci

  web-quality:
    name: Web CRM — Lint, tipos y build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/web
        run: npm ci

      - name: TypeScript — verificar tipos
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/web
        run: npm run lint

      - name: Next.js — build de producción
        working-directory: apps/web
        run: npm run build

  admin-web-quality:
    name: Admin Web — Lint, tipos y build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/admin-web
        run: npm ci

      - name: TypeScript — verificar tipos
        working-directory: apps/admin-web
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/admin-web
        run: npm run lint

      - name: Next.js — build de producción
        working-directory: apps/admin-web
        run: npm run build

  security-scan:
    name: Seguridad — dependencias vulnerables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit — API
        working-directory: apps/api
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc --output=json -o pip-audit-api.json || true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit — Web
        working-directory: apps/web
        run: npm audit --audit-level=high || true

      - name: npm audit — Admin Web
        working-directory: apps/admin-web
        run: npm audit --audit-level=high || true

  pipeline-ok:
    name: Pipeline — Todo OK
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - api-docker
      - admin-docker
      - web-quality
      - security-scan
    if: always()
    steps:
      - name: Verificar resultado de todos los jobs
        run: |
          echo "Checking job results..."
          echo "api-tests: ${{ needs.api-tests.result }}"
          echo "api-docker: ${{ needs.api-docker.result }}"
          echo "admin-docker: ${{ needs.admin-docker.result }}"
          echo "web-quality: ${{ needs.web-quality.result }}"
          echo "security-scan: ${{ needs.security-scan.result }}"

          if [ "${{ needs.api-tests.result }}" == "failure" ] || \
             [ "${{ needs.api-docker.result }}" == "failure" ] || \
             [ "${{ needs.admin-docker.result }}" == "failure" ] || \
             [ "${{ needs.web-quality.result }}" == "failure" ]; then
            echo "ERROR: Uno o más jobs fallaron."
            exit 1
          fi

          echo "✅ Todos los checks del pipeline pasaron."