name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — API
  # ─────────────────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint y tipos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Instalar dependencias
        working-directory: apps/api
        run: pip install --no-cache-dir -r requirements.txt

      - name: Instalar herramientas de dev
        run: pip install ruff pyright

      - name: Ruff — lint
        working-directory: apps/api
        run: ruff check .

      - name: Ruff — formato
        working-directory: apps/api
        run: ruff format --check .

      - name: Pyright — tipos
        working-directory: apps/api
        run: pyright

  api-test:
    name: API — Tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Instalar dependencias
        working-directory: apps/api
        run: pip install --no-cache-dir -r requirements.txt

      - name: Instalar herramientas de dev
        run: pip install pytest pytest-asyncio

      - name: Pytest (sin integración)
        working-directory: apps/api
        run: pytest -m "not integration" -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — Admin API
  # ─────────────────────────────────────────────────────────────────────────────
  admin-lint:
    name: Admin API — Lint y tipos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ruff
        run: pip install ruff

      - name: Ruff — lint
        working-directory: apps/admin
        run: ruff check .

      - name: Ruff — formato
        working-directory: apps/admin
        run: ruff format --check .

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — Web CRM
  # ─────────────────────────────────────────────────────────────────────────────
  web-lint:
    name: Web — Lint y tipos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/web
        run: npm ci

      - name: TypeScript — verificar tipos
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/web
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — Admin Web
  # ─────────────────────────────────────────────────────────────────────────────
  admin-web-lint:
    name: Admin Web — Lint y tipos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/admin-web
        run: npm ci

      - name: TypeScript — verificar tipos
        working-directory: apps/admin-web
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/admin-web
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Job resumen — todos los checks deben pasar para que el PR sea mergeable
  # ─────────────────────────────────────────────────────────────────────────────
  ci-ok:
    name: CI — Todo OK
    needs: [api-lint, api-test, admin-lint, web-lint, admin-web-lint]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Todos los checks de CI pasaron."
