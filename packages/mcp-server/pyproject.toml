[project]
name = "olimpo-mcp"
version = "0.1.0"
description = "Servidor MCP para los agentes IA de Olimpo CRM"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.0",
    "supabase>=2.10",
    "pydantic>=2.10",
    "pydantic-settings>=2.8",
    "python-dotenv>=1.0",
    "structlog>=25.0",
    "httpx>=0.28",
]

[project.scripts]
olimpo-mcp = "server:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
